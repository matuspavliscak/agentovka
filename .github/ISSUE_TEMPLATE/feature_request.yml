name: Feature request
description: Suggest a capability or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do that Agentovka does not support today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? New tool, new client method, docs, etc.
    validations:
      required: true
  - type: dropdown
    id: safety
    attributes:
      label: Does this touch the safety model?
      description: >
        Class B tools trigger legal delivery (EV13); Class C sends messages
        (a legal act). Changes here need extra care. See docs/delivery-semantics.md.
      options:
        - "No: it is a Class A (safe) or non-ISDS change"
        - "Maybe: not sure how it interacts with delivery/sending"
        - "Yes: it changes delivery-triggering or sending behavior"
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches, existing workarounds, or prior art (libisds, libdatovka, etc.).
